/* Improved Animations Stylesheet from https://element.how/elementor-improve-entrance-animations/ , works for the 'fade' animations */

@keyframes fadeDown {
    from {
        opacity: 0;
        transform: translate3d(0,-30px,0)
    }

    to {
        opacity: 1;
        transform: none
    }
}

.elementor-element.fadeInDown {
    animation-name: fadeDown
}

@keyframes fadeLeft {
    from {
        opacity: 0;
        transform: translate3d(-30px,0,0)
    }

    to {
        opacity: 1;
        transform: none
    }
}

.elementor-element.fadeInLeft {
    animation-name: fadeLeft
}

@keyframes fadeRight {
    from {
        opacity: 0;
        transform: translate3d(30px,0,0)
    }

    to {
        opacity: 1;
        transform: none
    }
}

.elementor-element.fadeInRight {
    animation-name: fadeRight
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translate3d(0,30px,0)
    }

    to {
        opacity: 1;
        transform: none
    }
}

.elementor-element.fadeInUp {
    animation-name: fadeUp
}/* End custom CSS */

    width: 110px;
    position: relative;

.product-nav-item::after {
    content: "";
    position: absolute;
    top: 10px;
    bottom: 10px;
    right: 0;
    width: 1px;
    background-color: rgba(131, 130, 130, .8);
}

.product-nav-item.last-prod::after {
    display: none;
}

.product-nav-item {
    overflow: hidden;
    padding: 1rem 1.5rem;
    margin: 0!important;
    min-height: 80px
}

.product-nav-item::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    top: 100%;
    left: 0;
    background-color: #00AFAA;
    transition: top .3s ease;
    z-index: -1;
}

.product-nav-item:hover::before {
    top: 0;
}

    .banner-nav-products > .elementor-widget-wrap.elementor-element-populated {

      callback();
    } else {
      setTimeout(() => waitForOneTrust(callback), 500);

        gtag('consent', 'default', { ad_storage: "granted", analytics_storage: "granted" });
      }
    });
  }

  waitForOneTrust(setDefaultConsent);

.btn-print {

}

	color: #00999A;
}
.btn-print .print-specs a {
	    font-size: 18px;
    font-weight: 600;

}

	color: #003640;
}
