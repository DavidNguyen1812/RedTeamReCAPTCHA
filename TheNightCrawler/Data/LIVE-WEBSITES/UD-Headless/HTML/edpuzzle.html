<html lang="en"><head>
				<meta charset="utf-8">
				<meta http-equiv="X-UA-Compatible" content="IE=edge">
				<meta name="description" content="Make any video your lesson">
				<title>Edpuzzle</title>
				<!-- social meta tags -->
				<meta name="viewport" content="width=device-width, initial-scale=1">
				<meta property="og:site_name" content="Edpuzzle">
				<meta property="og:title" content="{{ title }}">
				<meta property="og:url" content="{{ requestUrl }}">
				<meta property="og:description" content="{{ description }}">
				<meta property="og:image" content="{{ thumbnailUrl }}">
				<meta property="fb:app_id" content="391418697660879">
				<meta name="p:domain_verify" content="9f7d17df8a0b50f6f4b860bc68c530e7">
				<!-- meta tags for twitter -->
				<meta name="twitter:card" content="summary">
				<meta name="twitter:site" content="@edpuzzle">
				<meta name="twitter:title" content="{{ title }}">
				<meta name="twitter:description" content="{{ description }}">
				<meta name="twitter:image" content="{{ thumbnailUrl }}">
				<!-- favicon -->
				<link rel="shortcut icon" type="image/x-icon" href="https://image.edpuzzle.com/favicons/favicon-32.png">
				<style type="text/css">
					/* Fonts */
					/* https://assets.edpuzzle.com/fonts */
					@font-face {
						font-family: 'GT Pressura';
						src: url('https://assets.edpuzzle.com/fonts/GT-Pressura-Regular.woff2') format('woff2'),
							url('https://assets.edpuzzle.com/fonts/GT-Pressura-Regular.woff') format('woff'),
							url('https://assets.edpuzzle.com/fonts/GT-Pressura-Regular.ttf') format('truetype');
						font-style: normal;
					}

					@font-face {
						font-family: 'GT Pressura';
						src: url('https://assets.edpuzzle.com/fonts/GT-Pressura-Light.woff2') format('woff2'),
							url('https://assets.edpuzzle.com/fonts/GT-Pressura-Light.woff') format('woff'),
							url('https://assets.edpuzzle.com/fonts/GT-Pressura-Light.ttf') format('truetype');
						font-weight: 300;
						font-style: normal;
					}

					/* Css */
					.navbar {
						padding: 12px 24px;
						background: #fafafa;
					}
					.navbar-brand {
						height: 26px;
					}
					.main-content {
						display: flex;
						margin-top: 64px;
						align-items: center;
						flex-direction: column;
					}

					.something-went-wrong {
						font-family: GT Pressura;
						font-size: 24px;
						line-height: 35px;
						color: #434649;
						text-align: center;
						letter-spacing: 0.4px;
						font-weight: normal;
					}

					.technical-issues {
						max-width: 484px;
						padding-left: 4px;
						padding-right: 4px;
						margin: auto;
						padding-top: 24px;

						font-family: GT Pressura;
						font-weight: 300;
						font-size: 16px;
						line-height: 24px;

						text-align: center;
						letter-spacing: 0.4px;

						color: #73777d;
					}
					.twitter {
						text-decoration: none;
					}

					html,
					body {
						width: 100%;
						height: 100%;
						margin: 0px;
					}
				</style>
			</head>
			<body class="container">
				<header class="navbar" id="top" role="banner">
					<img class="navbar-brand" src="https://image.edpuzzle.com/edpuzzle-logos/horizontal-logo.svg" alt="Edpuzzle">
				</header>

				<div class="main-content">
					<img height="244" src="https://libs.edpuzzle.com/images/downtime/broken-pen.png" alt="web-downtime">
					<h1 class="something-went-wrong">Sorry, something went wrong</h1>
					<p class="technical-issues">
						Error 18. Please try again in a few minutes or contact support for further help. Thanks for
						your patience!
					</p>
				</div>
			
		</body></html>
